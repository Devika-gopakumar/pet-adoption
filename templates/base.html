<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Adoption</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
    nav a { margin-right: 16px; text-decoration: none; color: #2563eb; }
    h1 { font-size: 1.5rem; }
    form label { display: block; margin-top: 12px; font-weight: bold; }
    form input, form select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
    .message { margin-top: 12px; padding: 8px; background: #eef; border-radius: 4px; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('donate') }}">Donate a Pet</a>
    <a href="{{ url_for('adopt') }}">Adopt a Pet</a>
    <a href="{{ url_for('view') }}">View Available Pets</a>
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
